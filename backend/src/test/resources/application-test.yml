spring:
  datasource:
    url: jdbc:h2:mem:queueless_test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: test-secret-key-for-unit-tests-only-not-for-production-use-32bytes
    expiration-ms: 3600000
  seed-demo-data: false
