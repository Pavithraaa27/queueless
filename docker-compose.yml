version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: queueless
      POSTGRES_USER: queueless
      POSTGRES_PASSWORD: queueless
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U queueless"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: queueless
      DB_USERNAME: queueless
      DB_PASSWORD: queueless
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-only-secret-change-this-in-real-deployments-32bytes-min
      # Set to "false" once you have real businesses in the database, or before
      # deploying somewhere public where you don't want demo accounts created.
      SEED_DEMO_DATA: "true"
      # Daily owner insight panel: disabled by default (uses a free rule-based
      # summary). To use real LLM-generated summaries instead, set:
      #   AI_INSIGHTS_ENABLED: "true"
      #   ANTHROPIC_API_KEY: "sk-ant-..."
      AI_INSIGHTS_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
